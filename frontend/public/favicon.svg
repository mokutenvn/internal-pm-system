<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="rd-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background nexus connection lines -->
  <path d="M 24,6 L 40,16 L 40,32 L 24,42 L 8,32 L 8,16 Z" fill="none" stroke="url(#rd-grad)" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.4" />
  <path d="M 24,6 L 24,42 M 8,16 L 40,32 M 8,32 L 40,16" stroke="url(#rd-grad)" stroke-width="1" opacity="0.3" />
  
  <!-- Outer nodes -->
  <circle cx="24" cy="6" r="3" fill="#6366f1" />
  <circle cx="40" cy="16" r="3" fill="#a855f7" />
  <circle cx="40" cy="32" r="3" fill="#a855f7" />
  <circle cx="24" cy="42" r="3" fill="#6366f1" />
  <circle cx="8" cy="32" r="3" fill="#6366f1" />
  <circle cx="8" cy="16" r="3" fill="#a855f7" />
  
  <!-- Central tech nexus icon -->
  <g filter="url(#glow)">
    <!-- Tech diamond/node shape -->
    <path d="M 24,14 L 34,24 L 24,34 L 14,24 Z" fill="url(#rd-grad)" />
    <!-- Atom rings -->
    <ellipse cx="24" cy="24" rx="12" ry="5" fill="none" stroke="#ffffff" stroke-width="1.5" transform="rotate(30, 24, 24)" opacity="0.8" />
    <ellipse cx="24" cy="24" rx="12" ry="5" fill="none" stroke="#ffffff" stroke-width="1.5" transform="rotate(-30, 24, 24)" opacity="0.8" />
    <!-- Center core -->
    <circle cx="24" cy="24" r="4.5" fill="#ffffff" />
  </g>
</svg>